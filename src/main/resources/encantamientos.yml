encantamientos:
  # ==========================================
  # ⚔️ ENCANTAMIENTOS DE ARMAS (Combate)
  # ==========================================
  vampirismo:
    nombre: "&cVampirismo"
    nivel_maximo: 3
    aplica_a: ["Arma"]
    descripcion: "&7Cura un &c{val}% &7del daño que infliges."
    valores_por_nivel: [5.0, 10.0, 15.0]

  ejecutor:
    nombre: "&4Ejecutor"
    nivel_maximo: 5
    aplica_a: ["Arma"]
    descripcion: "&7Aumenta tu daño un &c{val}% &7si el enemigo tiene menos del 20% de HP."
    valores_por_nivel: [10.0, 15.0, 20.0, 30.0, 40.0]

  cazador:
    nombre: "&6Cazador"
    nivel_maximo: 5
    aplica_a: ["Arma"]
    descripcion: "&7Infliges un &6{val}% &7más de daño a monstruos (PvE)."
    valores_por_nivel: [5.0, 10.0, 15.0, 20.0, 25.0]

  veneno:
    nombre: "&2Veneno Mortal"
    nivel_maximo: 3
    aplica_a: ["Arma"]
    descripcion: "&7Tus ataques aplican veneno durante &2{val}s&7."
    valores_por_nivel: [3.0, 5.0, 7.0]

  # ==========================================
  # ⛏️ ENCANTAMIENTOS DE HERRAMIENTAS (Minería, Tala, Agri, Pesca)
  # ==========================================
  experiencia_divina:
    nombre: "&bExperiencia Divina"
    nivel_maximo: 3
    aplica_a: ["Herramienta"]
    descripcion: "&7Multiplica la Nexo XP obtenida al recolectar por &b{val}x&7."
    valores_por_nivel: [1.2, 1.5, 2.0]

  toque_de_midas:
    nombre: "&eToque de Midas"
    nivel_maximo: 3
    aplica_a: ["Herramienta"]
    descripcion: "&7Tienes un &e{val}% &7de probabilidad de encontrar Oro/Monedas al recolectar."
    valores_por_nivel: [2.0, 5.0, 10.0]

  bendicion_nexo:
    nombre: "&dBendición del Nexo"
    nivel_maximo: 5
    aplica_a: ["Herramienta"]
    descripcion: "&7Otorga un &d+{val}% &7bruto a tu Fortuna/Suerte total."
    valores_por_nivel: [5.0, 10.0, 15.0, 20.0, 30.0]

  # ==========================================
  # 🛡️ ENCANTAMIENTOS DE ARMADURA (Combate)
  # ==========================================
  coraza_espinosa:
    nombre: "&cCoraza Espinosa"
    nivel_maximo: 3
    aplica_a: ["Armadura"]
    descripcion: "&7Reflejas el &c{val}% &7del daño cuerpo a cuerpo recibido."
    valores_por_nivel: [5.0, 10.0, 15.0]

  vitalidad:
    nombre: "&4Vitalidad"
    nivel_maximo: 5
    aplica_a: ["Armadura"]
    descripcion: "&7Aumenta tu Vida Máxima en &4+{val} &7puntos."
    valores_por_nivel: [10.0, 20.0, 30.0, 40.0, 50.0]

  evasion:
    nombre: "&fEvasión"
    nivel_maximo: 3
    aplica_a: ["Armadura"]
    descripcion: "&7Tienes un &f{val}% &7de probabilidad de esquivar un ataque por completo."
    valores_por_nivel: [3.0, 6.0, 10.0]

  # ==========================================
  # 👨‍🌾 ENCANTAMIENTOS DE ARMADURA (Profesiones)
  # ==========================================
  aura_recolectora:
    nombre: "&aAura Recolectora"
    nivel_maximo: 3
    aplica_a: ["Armadura"]
    descripcion: "&7Añade un &a+{val}% &7de Fortuna global mientras llevas esta pieza."
    valores_por_nivel: [2.0, 4.0, 8.0]

  paso_ligero:
    nombre: "&bPaso Ligero"
    nivel_maximo: 2
    aplica_a: ["Armadura"]
    descripcion: "&7Aumenta tu Velocidad de Movimiento en &b+{val}%&7."
    valores_por_nivel: [5.0, 10.0]