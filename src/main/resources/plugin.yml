name: NexoCore
version: 1.0
main: me.tunombre.server.Main
api-version: '1.21'
softdepend: [PlaceholderAPI, MythicMobs, eco]
depend: [AuraSkills, Nexo]
commands:
  test:
    description: Mi comando de prueba
  nexocore: # <--- ¡Cambiamos esto de "nexo" a "nexocore"!
    description: Comando de administracion del Nexo
    permission: nexo.admin
  desguace:
    description: Abre el menu de reciclaje
  pv:
    description: Abre tu mochila virtual
    aliases: [ mochila, vault ]
  wardrobe:
    description: Abre tu guardarropa personal
    aliases: [ guardarropa, ropero ]
  accesorios:
    description: Abre tu bolsa de accesorios
    aliases: [ acc, accessories ]
  pvp:
    description: Activa o desactiva tu Modo de Guerra
    aliases: [ modo ]
libraries:
  - com.zaxxer:HikariCP:5.1.0
  - org.postgresql:postgresql:42.7.2